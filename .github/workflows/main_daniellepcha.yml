name: Build and deploy Node.js app to Azure Web App - daniellepcha

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      # 👇 Run everything inside server directory
      - name: Install, build, test (server only)
        working-directory: ./server
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present

      # 👇 Upload ONLY server folder
      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./server

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_19B3465DF7144C6AAC08E8BC47F38495 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5E72B6CB8ECC40BE85C7F03AA5A752CE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_9029C0E7A2E346AD80BB3E57CBEED865 }}

      - name: Deploy server to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'daniellepcha'
          slot-name: 'Production'
          package: .
